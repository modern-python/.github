site_name: Modern Python
site_url: https://modern-python.org/
site_description: Open-source templates and libraries for building production-ready Python applications.
repo_url: https://github.com/modern-python
repo_name: modern-python

# Repo-internal docs that must not be published to the public site.
exclude_docs: |
  superpowers/
  DEPLOYMENT.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/modern-python.png
  favicon: assets/modern-python.png
  features:
    - navigation.instant
    - navigation.top
    - search.suggest
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
