name: Planning

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-planning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - name: Validate planning changes
        run: uv run python planning/index.py --check
